<header class="header">
    <a href="/" aria-label="Home">
        <img src="{{ url_for('static', filename='image_assets/logo.png') }}" alt="Niklas Clasen Consulting" class="header__logo" width="2000" height="853">
    </a>

    <nav>
        <ul class="header__menu">
            <li>
                <a class="header__link" href="/">{{ t.nav.home }}</a>
            </li>
            <li>
                <a class="header__link" href="/projects">{{ t.nav.projects }}</a>
            </li>
            <li>
                <a class="header__link" href="/services">{{ t.nav.services }}</a>
            </li>
            <li>
                <a class="header__link" href="/blog">{{ t.nav.blog }}</a>
            </li>
            <li>
                <a class="header__link" href="/process">{{ t.nav.process }}</a>
            </li>
            <li class="header__line"></li>
            <li>
                <div class="lang-switch">
                    <a href="?lang=en" class="{{ 'active-lang' if lang == 'en' }}">EN</a>
                    <a href="?lang=de" class="{{ 'active-lang' if lang == 'de' }}">DE</a>
                </div>
            </li>
            <li class="header__line"></li>
            <li class="toggle-switch">
                <img src="{{ url_for('static', filename='image_assets/contrast.png') }}" alt="Light mode"
                     class="color-mode">
                <input type="checkbox" id="theme-toggle" class="toggle" aria-label="Toggle dark mode"/>
                <label for="theme-toggle"></label>
                <img src="{{ url_for('static', filename='image_assets/crescent-moon.png') }}" alt="Dark mode"
                     class="color-mode">
            </li>
            <li class="header__line"></li>
            <li>
                <a class="header__contact button" href="/contact">{{ t.nav.contact }}</a>
            </li>
        </ul>
    </nav>
</header>
<!-- Mobile Navigation -->
<div class="dropdown">
    <button class="hamburger" aria-label="Toggle navigation menu" onclick="this.classList.toggle('is-active');this.parentElement.classList.toggle('open')">
        <span class="hamburger__line"></span>
        <span class="hamburger__line"></span>
        <span class="hamburger__line"></span>
    </button>
    <div class="dropdown-content">
        <a href="/">{{ t.nav.home }}</a>
        <a href="/projects">{{ t.nav.projects }}</a>
        <a href="/services">{{ t.nav.services }}</a>
        <a href="/blog">{{ t.nav.blog }}</a>
        <a href="/process">{{ t.nav.process }}</a>
        <a href="/contact">{{ t.nav.contact }}</a>
    </div>
</div>
<script src="{{ url_for('static', filename='js_components/theme-toggler.js') }}"></script>
